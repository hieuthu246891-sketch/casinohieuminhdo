<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

input,button{
padding:10px;
font-size:18px;
margin:5px;
}

.reel{
display:inline-block;
width:90px;
height:90px;
line-height:90px;
font-size:60px;
border:2px solid white;
margin:5px;
}

.spin{
animation:spin 0.3s linear infinite;
}

@keyframes spin{
0%{transform:translateY(-20px)}
50%{transform:translateY(20px)}
100%{transform:translateY(-20px)}
}

#history{
margin-top:20px;
width:320px;
margin-left:auto;
margin-right:auto;
background:#111;
padding:10px;
height:200px;
overflow:auto;
border:1px solid white;
text-align:left;
}

</style>

</head>
<body>

<h1>🎰 Casino Slot</h1>

<div id="login">

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="game" style="display:none">

<h2 id="money">Money: 0</h2>

Bet:
<input id="bet" type="number" value="100" min="10" step="10">

<br><br>

<div>

<div class="reel" id="r1">🂡</div>
<div class="reel" id="r2">🂱</div>
<div class="reel" id="r3">🃁</div>

</div>

<br>

<button onclick="spin()">🎰 SPIN</button>

<div id="history"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec",
measurementId: "G-V7RM6KZXVW"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid;
let money=0;

const cards=["🂡","🂱","🃁","🃑","🂮","🂭","🂫","🂪"];

function addHistory(text){

let h=document.getElementById("history");
h.innerHTML="<div>"+text+"</div>"+h.innerHTML;

}

window.register=()=>{

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)

.then(user=>{

set(ref(db,"users/"+user.user.uid),{
money:1000
});

alert("Register success");

});

};

window.login=()=>{

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)

.then(async user=>{

uid=user.user.uid;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

let data=await get(ref(db,"users/"+uid));

money=data.val().money;

document.getElementById("money").innerText="Money: "+money;

})

.catch(()=>alert("Login fail"));

};

window.spin=()=>{

let bet=parseInt(document.getElementById("bet").value);

if(bet>money){

alert("Not enough money");

return;

}

money-=bet;

document.getElementById("money").innerText="Money: "+money;

let r1=document.getElementById("r1");
let r2=document.getElementById("r2");
let r3=document.getElementById("r3");

r1.classList.add("spin");
r2.classList.add("spin");
r3.classList.add("spin");

setTimeout(()=>{

r1.classList.remove("spin");
r2.classList.remove("spin");
r3.classList.remove("spin");

let c1=cards[Math.floor(Math.random()*cards.length)];
let c2=cards[Math.floor(Math.random()*cards.length)];
let c3=cards[Math.floor(Math.random()*cards.length)];

r1.innerText=c1;
r2.innerText=c2;
r3.innerText=c3;

if(c1==c2 && c2==c3){

let win=bet*20;

money+=win;

addHistory("👑 JACKPOT +"+win);

alert("JACKPOT x20");

}

else if(c1==c2 || c2==c3 || c1==c3){

let win=bet*10;

money+=win;

addHistory("💰 WIN +"+win);

}

else{

addHistory("❌ Lose -"+bet);

}

document.getElementById("money").innerText="Money: "+money;

set(ref(db,"users/"+uid+"/money"),money);

},1500);

};

</script>

</body>
</html>
