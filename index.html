<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

input,button{
padding:8px;
margin:5px;
font-size:16px;
}

#slot{
display:grid;
grid-template-columns:repeat(3,100px);
grid-gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
background:#111;
border:2px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:6px 12px;
}

.admin{
border:2px solid red;
margin-top:20px;
padding:10px;
display:none;
}

</style>
</head>

<body>

<h1>🎰 CASINO SLOT</h1>

<div id="auth">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="game" style="display:none">

<h3>Email: <span id="userEmail"></span></h3>
<h4>UID: <span id="uid"></span></h4>

Money: $<span id="money">0</span>  
Jackpot: $<span id="jackpot">1000</span>

<br><br>

Bet: <input id="bet" value="10" style="width:80px">

Spin Count: <input id="spinCount" value="1" style="width:60px">

<button onclick="spin()">SPIN</button>

<div id="slot">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<h3>🎰 Bảng giải thưởng</h3>

<table>

<tr>
<th>Kết quả</th>
<th>Thưởng</th>
</tr>

<tr>
<td>3 lá cùng giá trị</td>
<td>x5</td>
</tr>

<tr>
<td>3 lá cùng giá trị + cùng chất</td>
<td>x20</td>
</tr>

<tr>
<td>AAA cùng chất</td>
<td>x100</td>
</tr>

</table>


<h3>🏆 Top người chơi</h3>

<table id="leaderboard">

<tr>
<th>Top</th>
<th>Email</th>
<th>Tiền</th>
</tr>

</table>


<div class="admin" id="adminPanel">

<h3>ADMIN PANEL</h3>

User UID: <input id="targetUID">
Amount: <input id="amount">

<br>

<button onclick="deposit()">Nạp</button>
<button onclick="withdraw()">Rút</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
update,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec",
measurementId: "G-V7RM6KZXVW"

};

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getDatabase(app)

let currentUser=null
let money=0
let jackpot=1000

const symbols=[
"A♠","K♠","Q♠",
"A♥","K♥","Q♥",
"A♦","K♦","Q♦",
"A♣","K♣","Q♣"
]

let grid=new Array(9)

function randomSymbol(){
return symbols[Math.floor(Math.random()*symbols.length)]
}

function draw(){
for(let i=0;i<9;i++){
document.getElementById("c"+i).innerText=grid[i]
}
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="vi-VN"
speechSynthesis.speak(msg)
}

window.register=()=>{

let email=emailInput()
let password=passwordInput()

createUserWithEmailAndPassword(auth,email,password)

.then(user=>{

set(ref(db,"users/"+user.user.uid),{
money:1000,
email:email
})

alert("Register success")

})

}

window.login=()=>{

let email=emailInput()
let password=passwordInput()

signInWithEmailAndPassword(auth,email,password)

.then(async user=>{

currentUser=user.user

document.getElementById("auth").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("uid").innerText=currentUser.uid
document.getElementById("userEmail").innerText=currentUser.email

let data=await get(ref(db,"users/"+currentUser.uid))

money=data.val().money

updateMoney()

if(currentUser.email==="admin@casino.com"){
document.getElementById("adminPanel").style.display="block"
}

loadLeaderboard()

})

}

function emailInput(){
return document.getElementById("email").value
}

function passwordInput(){
return document.getElementById("password").value
}

function updateMoney(){

document.getElementById("money").innerText=money
document.getElementById("jackpot").innerText=jackpot

}

async function spinColumn(col){

return new Promise(resolve=>{

let spins=10

let interval=setInterval(()=>{

for(let r=0;r<3;r++){
grid[r*3+col]=randomSymbol()
}

draw()

spins--

if(spins<=0){

clearInterval(interval)

for(let r=0;r<3;r++){
grid[r*3+col]=randomSymbol()
}

draw()

resolve()

}

},80)

})

}

window.spin=async()=>{

let bet=parseInt(document.getElementById("bet").value)
let spinCount=parseInt(document.getElementById("spinCount").value)

let total=bet*spinCount

if(money<total){
alert("Không đủ tiền")
return
}

money-=total

for(let i=0;i<spinCount;i++){

await spinColumn(0)
await spinColumn(1)
await spinColumn(2)

checkWin(bet)

await new Promise(r=>setTimeout(r,500))

}

saveMoney()

}

function checkWin(bet){

for(let r=0;r<3;r++){

let a=grid[r*3]
let b=grid[r*3+1]
let c=grid[r*3+2]

let v1=a[0]
let v2=b[0]
let v3=c[0]

let s1=a[1]
let s2=b[1]
let s3=c[1]

if(v1===v2 && v2===v3){

if(v1==="A" && s1===s2 && s2===s3){

let win=bet*100
money+=win
alert("ĐẠI JACKPOT "+win)
speak("Đại jackpot "+win)

}

else if(s1===s2 && s2===s3){

let win=bet*20
money+=win
alert("JACKPOT "+win)
speak("Jackpot "+win)

}

else{

let win=bet*5
money+=win
alert("Win "+win)
speak("Bạn thắng "+win)

}

}

}

updateMoney()

}

async function saveMoney(){

await update(ref(db,"users/"+currentUser.uid),{
money:money
})

}

window.deposit=async()=>{

let uid=document.getElementById("targetUID").value
let amount=parseInt(document.getElementById("amount").value)

let data=await get(ref(db,"users/"+uid))

let newMoney=data.val().money+amount

await update(ref(db,"users/"+uid),{
money:newMoney
})

}

window.withdraw=async()=>{

let uid=document.getElementById("targetUID").value
let amount=parseInt(document.getElementById("amount").value)

let data=await get(ref(db,"users/"+uid))

let newMoney=data.val().money-amount

await update(ref(db,"users/"+uid),{
money:newMoney
})

}

function loadLeaderboard(){

onValue(ref(db,"users"),snapshot=>{

let data=snapshot.val()

let arr=[]

for(let uid in data){

arr.push({
email:data[uid].email,
money:data[uid].money
})

}

arr.sort((a,b)=>b.money-a.money)

let table=document.getElementById("leaderboard")

table.innerHTML=`

<tr>
<th>Top</th>
<th>Email</th>
<th>Tiền</th>
</tr>
`

arr.slice(0,10).forEach((p,i)=>{

table.innerHTML+=`

<tr>
<td>${i+1}</td>
<td>${p.email}</td>
<td>${p.money}</td>
</tr>

`

})

})

}

</script>

</body>
</html>
