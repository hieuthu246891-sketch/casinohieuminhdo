<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Test</title>
</head>

<body>

<h2>Register</h2>

<input id="regUser" placeholder="username">
<input id="regPass" placeholder="password">

<button onclick="register()">Register</button>

<h2>Login</h2>

<input id="loginUser" placeholder="username">
<input id="loginPass" placeholder="password">

<button onclick="login()">Login</button>

<h3 id="money"></h3>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",

authDomain: "casino-slot-ec289.firebaseapp.com",

databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "casino-slot-ec289",

storageBucket: "casino-slot-ec289.firebasestorage.app",

messagingSenderId: "191169506693",

appId: "1:191169506693:web:18eae48ffff0922492e8ec"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.register = async function(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

await set(ref(db,"users/"+user),{

password:pass,
money:10000

})

alert("register success")

}

window.login = async function(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let snapshot = await get(ref(db,"users/"+user))

if(!snapshot.exists()){

alert("user not found")
return

}

let data=snapshot.val()

if(data.password!=pass){

alert("wrong password")
return

}

document.getElementById("money").innerText="Money: "+data.money

alert("login success")

}

</script>

</body>
</html>
