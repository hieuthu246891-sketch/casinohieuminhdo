<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

input,button{
padding:8px;
margin:5px;
font-size:16px;
}

#grid{
display:grid;
grid-template-columns:repeat(3,80px);
grid-gap:10px;
justify-content:center;
margin:20px;
}

.cell{
width:80px;
height:80px;
font-size:50px;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
}

.spin{
animation:spin 0.3s linear infinite;
}

@keyframes spin{
0%{transform:translateY(-20px)}
50%{transform:translateY(20px)}
100%{transform:translateY(-20px)}
}

#history{
width:300px;
height:150px;
overflow:auto;
background:#222;
margin:auto;
padding:10px;
}

</style>

</head>

<body>

<h1>🎰 Casino Slot</h1>

<div id="login">

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="game" style="display:none">

<h2 id="money">Money: 0</h2>

Bet
<input id="bet" type="number" value="100">

<br>

<div id="grid">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<button onclick="spin()">SPIN</button>

<h3>History</h3>

<div id="history"></div>

<div id="admin" style="display:none">

<h2>ADMIN PANEL</h2>

<input id="uid" placeholder="User UID">

<input id="addmoney" placeholder="Money">

<button onclick="addMoney()">Add Money</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app);

let uid;

let money=0;

const cards=["🂡","🂱","🃁","🃑","🂮","🂭","🂫","🂪"];

function history(t){

let h=document.getElementById("history");

h.innerHTML="<div>"+t+"</div>"+h.innerHTML;

}

window.register=()=>{

let email=emailInput();

let pass=passwordInput();

createUserWithEmailAndPassword(auth,email,pass)

.then(user=>{

set(ref(db,"users/"+user.user.uid),{

money:1000

});

alert("Register success");

})

.catch(e=>alert(e.message));

}

window.login=()=>{

let email=emailInput();

let pass=passwordInput();

signInWithEmailAndPassword(auth,email,pass)

.then(async user=>{

uid=user.user.uid;

document.getElementById("login").style.display="none";

document.getElementById("game").style.display="block";

let data=await get(ref(db,"users/"+uid));

money=data.val().money;

document.getElementById("money").innerText =
"Money: "+money+" | UID: "+uid;

if(email=="admin@casino.com"){

document.getElementById("admin").style.display="block";

}

})

.catch(e=>alert(e.message));

}

function emailInput(){

return document.getElementById("email").value;

}

function passwordInput(){

return document.getElementById("password").value;

}

window.spin=()=>{

let bet=parseInt(document.getElementById("bet").value);

if(bet>money){
alert("Not enough money");
return;
}

money-=bet;

let result=[];

/* quay cột 1 */

let spin1=setInterval(()=>{

for(let i of [0,3,6]){

let c=cards[Math.floor(Math.random()*cards.length)];
document.getElementById("c"+i).innerText=c;

}

},80);

setTimeout(()=>{

clearInterval(spin1);

/* quay cột 2 */

let spin2=setInterval(()=>{

for(let i of [1,4,7]){

let c=cards[Math.floor(Math.random()*cards.length)];
document.getElementById("c"+i).innerText=c;

}

},80);

setTimeout(()=>{

clearInterval(spin2);

/* quay cột 3 */

let spin3=setInterval(()=>{

for(let i of [2,5,8]){

let c=cards[Math.floor(Math.random()*cards.length)];
document.getElementById("c"+i).innerText=c;

}

},80);

setTimeout(()=>{

clearInterval(spin3);

/* lấy kết quả */

for(let i=0;i<9;i++){
result.push(document.getElementById("c"+i).innerText);
}

checkWin(result,bet);

document.getElementById("money").innerText="Money: "+money;

set(ref(db,"users/"+uid+"/money"),money);

},1000);

},700);

},700);

}

setTimeout(()=>{

for(let i=0;i<9;i++){

let c=cards[Math.floor(Math.random()*cards.length)];

document.getElementById("c"+i).innerText=c;

document.getElementById("c"+i).classList.remove("spin");

result.push(c);

}

checkWin(result,bet);

document.getElementById("money").innerText="Money: "+money;

set(ref(db,"users/"+uid+"/money"),money);

},1200);

}

function checkWin(r,bet){

let win=0;

if(r[0]==r[1]&&r[1]==r[2])win+=bet*10;
if(r[3]==r[4]&&r[4]==r[5])win+=bet*10;
if(r[6]==r[7]&&r[7]==r[8])win+=bet*10;

if(r[0]==r[3]&&r[3]==r[6])win+=bet*10;
if(r[1]==r[4]&&r[4]==r[7])win+=bet*10;
if(r[2]==r[5]&&r[5]==r[8])win+=bet*10;

if(win>=bet*30){

win=bet*20;

history("👑 JACKPOT +"+win);

}

else if(win>0){

history("💰 WIN +"+win);

}

else{

history("❌ Lose -"+bet);

}

money+=win;

}

window.addMoney=async()=>{

let id=document.getElementById("uid").value;

let add=parseInt(document.getElementById("addmoney").value);

let data=await get(ref(db,"users/"+id));

let m=data.val().money+add;

update(ref(db,"users/"+id),{

money:m

});

alert("Added");

}

</script>

</body>
</html>
