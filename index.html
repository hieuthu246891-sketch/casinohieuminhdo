<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.slot{
display:grid;
grid-template-columns:repeat(3,90px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:90px;
height:90px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

#admin{
margin-top:30px;
background:#222;
padding:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>🎰 CASINO SLOT 🎰</h1>

<div id="login">

<input id="username" placeholder="username"><br><br>
<input id="password" type="password" placeholder="password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="game" style="display:none">

<h2 id="welcome"></h2>

<h3>Money: <span id="money">0</span></h3>

Bet:
<button onclick="changeBet(-100)">-</button>
<span id="bet">100</span>
<button onclick="changeBet(100)">+</button>

<br><br>

<button onclick="spin()">🎰 SPIN</button>

<div class="slot">

<div class="cell" id="s0"></div>
<div class="cell" id="s1"></div>
<div class="cell" id="s2"></div>

<div class="cell" id="s3"></div>
<div class="cell" id="s4"></div>
<div class="cell" id="s5"></div>

<div class="cell" id="s6"></div>
<div class="cell" id="s7"></div>
<div class="cell" id="s8"></div>

</div>

<h3>History</h3>
<div id="history"></div>

<div id="admin" style="display:none">

<h3>ADMIN PANEL</h3>

<input id="targetUser" placeholder="username">

<br><br>

<button onclick="addMoney()">+10000</button>
<button onclick="removeMoney()">-10000</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser="";
let money=0;
let bet=100;

const symbols=["🍒","🍋","🍇","⭐","7","💎"];

function updateUI(){
document.getElementById("money").innerText=money;
document.getElementById("bet").innerText=bet;
}

window.changeBet=function(v){
bet+=v;
if(bet<100) bet=100;
updateUI();
}

window.register=async function(){

let u=username.value;
let p=password.value;

await set(ref(db,"users/"+u),{
password:p,
money:10000
});

alert("Register success");

}

window.login=async function(){

let u=username.value;
let p=password.value;

let snap=await get(ref(db,"users/"+u));

if(!snap.exists()){
alert("User not found");
return;
}

let data=snap.val();

if(data.password!=p){
alert("Wrong password");
return;
}

currentUser=u;
money=data.money;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("welcome").innerText="Welcome "+u;

updateUI();

if(u=="hieu10"){
document.getElementById("admin").style.display="block";
}

}

function randomSymbol(){
return symbols[Math.floor(Math.random()*symbols.length)];
}

window.spin=function(){

if(money<bet){
alert("Not enough money");
return;
}

money-=bet;

let grid=[];

for(let i=0;i<9;i++){

let s=randomSymbol();

grid.push(s);

document.getElementById("s"+i).innerText=s;

}

let win=0;

let lines=[

[0,1,2],
[3,4,5],
[6,7,8],

[0,3,6],
[1,4,7],
[2,5,8]

];

for(let l of lines){

if(grid[l[0]]==grid[l[1]] && grid[l[1]]==grid[l[2]]){

win+=bet*5;

}

}

if(Math.random()<0.01){

win+=bet*50;
alert("💎 JACKPOT!");

}

money+=win;

update(ref(db,"users/"+currentUser),{
money:money
});

updateUI();

let h=document.createElement("div");

h.innerText="Win "+win;

document.getElementById("history").prepend(h);

}

window.addMoney=async function(){

let u=targetUser.value;

let snap=await get(ref(db,"users/"+u));

let m=snap.val().money+10000;

update(ref(db,"users/"+u),{
money:m
});

alert("Added");

}

window.removeMoney=async function(){

let u=targetUser.value;

let snap=await get(ref(db,"users/"+u));

let m=snap.val().money-10000;

update(ref(db,"users/"+u),{
money:m
});

alert("Removed");

}

</script>

</body>
</html>
