<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

input,button{
padding:8px;
margin:5px;
font-size:16px;
}

#slot{
display:grid;
grid-template-columns:repeat(3,100px);
grid-gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
background:#111;
border:2px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

.reelSpin{
animation:spin 0.2s linear infinite;
}

@keyframes spin{
0%{transform:translateY(-10px)}
50%{transform:translateY(10px)}
100%{transform:translateY(-10px)}
}

#info{
margin-top:20px;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid white;
padding:6px 12px;
}

</style>
</head>

<body>

<h1>🎰 CASINO SLOT</h1>

<div id="auth">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="game" style="display:none">

<h3>UID: <span id="uid"></span></h3>

<div id="info">

Money: $<span id="money">1000</span>  
Jackpot: $<span id="jackpot">1000</span>

<br><br>

Bet: <input id="bet" value="10" style="width:80px">

<button onclick="spin()">SPIN</button>

</div>

<div id="slot">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<table>

<tr>
<th>Type</th>
<th>Reward</th>
</tr>

<tr>
<td>3 giống nhau</td>
<td>x5</td>
</tr>

<tr>
<td>AAA</td>
<td>Jackpot x20</td>
</tr>

</table>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec",
measurementId: "G-V7RM6KZXVW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register=()=>{
createUserWithEmailAndPassword(
auth,
email.value,
password.value
).then(()=>{
alert("Register success")
})
.catch(e=>alert(e.message))
}

window.login=()=>{
signInWithEmailAndPassword(
auth,
email.value,
password.value
).then(user=>{

document.getElementById("auth").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("uid").innerText=user.user.uid

})
.catch(e=>alert(e.message))
}

let money=1000
let jackpot=1000

const symbols=[
"A♠","K♠","Q♠",
"A♥","K♥","Q♥",
"A♦","K♦","Q♦",
"A♣","K♣","Q♣"
]

let grid=new Array(9)

function randomSymbol(){
return symbols[Math.floor(Math.random()*symbols.length)]
}

function draw(){
for(let i=0;i<9;i++){
document.getElementById("c"+i).innerText=grid[i]
}
}

function spinColumn(col){

return new Promise(resolve=>{

let spins=10

let interval=setInterval(()=>{

for(let r=0;r<3;r++){
grid[r*3+col]=randomSymbol()
}

draw()

spins--

if(spins<=0){

clearInterval(interval)

for(let r=0;r<3;r++){
grid[r*3+col]=randomSymbol()
}

draw()

resolve()

}

},80)

})

}

window.spin=async()=>{

let bet=parseInt(betInput())

if(money<bet){
alert("Not enough money")
return
}

money-=bet
jackpot+=Math.floor(bet*0.2)

updateMoney()

await spinColumn(0)
await spinColumn(1)
await spinColumn(2)

checkWin(bet)

}

function betInput(){
return document.getElementById("bet").value
}

function updateMoney(){

document.getElementById("money").innerText=money
document.getElementById("jackpot").innerText=jackpot

}

function checkWin(bet){

for(let r=0;r<3;r++){

let a=grid[r*3]
let b=grid[r*3+1]
let c=grid[r*3+2]

if(a===b && b===c){

if(a.includes("A")){

let win=bet*20+jackpot
money+=win
jackpot=1000
alert("JACKPOT +" + win)

}else{

let win=bet*5
money+=win
alert("WIN +" + win)

}

}

}

updateMoney()

}

</script>

</body>
</html>
