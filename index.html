<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

input,button{
padding:8px;
margin:5px;
font-size:16px;
}

#slot{
display:grid;
grid-template-columns:repeat(3,100px);
grid-gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
background:#111;
border:2px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

.admin{
margin-top:20px;
border:2px solid red;
padding:10px;
display:none;
}

</style>
</head>

<body>

<h1>🎰 CASINO SLOT</h1>

<div id="auth">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="game" style="display:none">

<h3>UID: <span id="uid"></span></h3>

Money: $<span id="money">0</span>  
Jackpot: $<span id="jackpot">1000</span>

<br><br>

Bet: <input id="bet" value="10" style="width:80px">

Spin Count: <input id="spinCount" value="1" style="width:60px">

<button onclick="spin()">SPIN</button>

<div id="slot">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<div class="admin" id="adminPanel">

<h3>ADMIN PANEL</h3>

User UID: <input id="targetUID">

Amount: <input id="amount">

<br>

<button onclick="deposit()">Nạp tiền</button>
<button onclick="withdraw()">Rút tiền</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec",
measurementId: "G-V7RM6KZXVW"

};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

let currentUser=null
let money=0
let jackpot=1000

const symbols=[
"A♠","K♠","Q♠",
"A♥","K♥","Q♥",
"A♦","K♦","Q♦",
"A♣","K♣","Q♣"
]

let grid=new Array(9)

function randomSymbol(){
return symbols[Math.floor(Math.random()*symbols.length)]
}

function draw(){
for(let i=0;i<9;i++){
document.getElementById("c"+i).innerText=grid[i]
}
}

function speak(text){

let msg=new SpeechSynthesisUtterance(text)
msg.lang="vi-VN"

speechSynthesis.speak(msg)

}

window.register=()=>{

let email=document.getElementById("email").value
let password=document.getElementById("password").value

createUserWithEmailAndPassword(auth,email,password)

.then(user=>{

set(ref(db,"users/"+user.user.uid),{
money:1000
})

alert("Register success")

})

.catch(e=>alert(e.message))

}

window.login=()=>{

let email=document.getElementById("email").value
let password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)

.then(async user=>{

currentUser=user.user

document.getElementById("auth").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("uid").innerText=currentUser.uid

let data=await get(ref(db,"users/"+currentUser.uid))

money=data.val().money

updateMoney()

if(currentUser.email==="admin@casino.com"){
document.getElementById("adminPanel").style.display="block"
}

})

.catch(e=>alert(e.message))

}

async function saveMoney(){

await update(ref(db,"users/"+currentUser.uid),{
money:money
})

}

function updateMoney(){

document.getElementById("money").innerText=money
document.getElementById("jackpot").innerText=jackpot

}

async function spinColumn(col){

return new Promise(resolve=>{

let spins=10

let interval=setInterval(()=>{

for(let r=0;r<3;r++){
grid[r*3+col]=randomSymbol()
}

draw()

spins--

if(spins<=0){

clearInterval(interval)

for(let r=0;r<3;r++){
grid[r*3+col]=randomSymbol()
}

draw()

resolve()

}

},80)

})

}

window.spin=async()=>{

let bet=parseInt(document.getElementById("bet").value)
let spinCount=parseInt(document.getElementById("spinCount").value)

let total=bet*spinCount

if(money<total){
alert("Không đủ tiền")
return
}

money-=total

updateMoney()

for(let i=0;i<spinCount;i++){

jackpot+=Math.floor(bet*0.2)

await spinColumn(0)
await spinColumn(1)
await spinColumn(2)

checkWin(bet)

await new Promise(r=>setTimeout(r,500))

}

saveMoney()

}

function checkWin(bet){

let winFound=false

for(let r=0;r<3;r++){

let a=grid[r*3]
let b=grid[r*3+1]
let c=grid[r*3+2]

if(a===b && b===c){

winFound=true

if(a.includes("A")){

let win=bet*20+jackpot

money+=win
jackpot=1000

alert("JACKPOT "+win)
speak("Jackpot "+win+" đô")

}else{

let win=bet*5

money+=win

alert("Win "+win)
speak("Bạn thắng "+win+" đô")

}

}

}

if(!winFound){
speak("Không trúng")
}

updateMoney()

}

window.deposit=async()=>{

let uid=document.getElementById("targetUID").value
let amount=parseInt(document.getElementById("amount").value)

let data=await get(ref(db,"users/"+uid))

let newMoney=data.val().money+amount

await update(ref(db,"users/"+uid),{
money:newMoney
})

alert("Nạp thành công")

}

window.withdraw=async()=>{

let uid=document.getElementById("targetUID").value
let amount=parseInt(document.getElementById("amount").value)

let data=await get(ref(db,"users/"+uid))

let newMoney=data.val().money-amount

await update(ref(db,"users/"+uid),{
money:newMoney
})

alert("Rút thành công")

}

</script>

</body>
</html>
