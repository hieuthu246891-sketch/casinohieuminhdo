<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Slot</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.slot{
font-size:60px;
margin:20px;
}

button{
padding:10px 20px;
font-size:18px;
margin:5px;
}

.admin{
margin-top:40px;
padding:20px;
background:#222;
}
</style>
</head>

<body>

<h1>🎰 Casino Slot</h1>

<h2>Số dư: <span id="money">1000</span></h2>

<h3>Cược: <span id="bet">50</span></h3>

<button onclick="betUp()">Tăng cược</button>
<button onclick="betDown()">Giảm cược</button>

<div class="slot" id="slot">🍒 🍋 🍊</div>

<button onclick="spin()">QUAY</button>

<hr>

<h2>Admin</h2>

<input id="adminUser" placeholder="user">
<input id="adminPass" placeholder="password">
<button onclick="adminLogin()">Login</button>

<div id="adminPanel" class="admin" style="display:none">

<h3>Quản lý tiền</h3>

<input id="amount" placeholder="số tiền">

<button onclick="addMoney()">Nạp tiền</button>
<button onclick="removeMoney()">Rút tiền</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.firebaseio.com",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.appspot.com",
messagingSenderId: "123456",
appId: "1:123456:web:test"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let money = 1000
let bet = 50

const symbols = ["🍒","🍋","🍊","💎","7️⃣"]

function updateUI(){
document.getElementById("money").innerText = money
document.getElementById("bet").innerText = bet
}

function betUp(){
bet += 50
updateUI()
}

function betDown(){
if(bet>50){
bet -= 50
}
updateUI()
}

function spin(){

if(money < bet){
alert("Không đủ tiền")
return
}

money -= bet

let a = symbols[Math.floor(Math.random()*symbols.length)]
let b = symbols[Math.floor(Math.random()*symbols.length)]
let c = symbols[Math.floor(Math.random()*symbols.length)]

document.getElementById("slot").innerText = a+" "+b+" "+c

if(a==b && b==c){
let win = bet * 5
money += win
alert("TRÚNG "+win)
}

updateUI()

saveMoney()

}

function saveMoney(){
db.ref("casino/money").set(money)
}

function loadMoney(){
db.ref("casino/money").on("value",(snap)=>{
if(snap.exists()){
money = snap.val()
updateUI()
}
})
}

loadMoney()

function adminLogin(){

let u = document.getElementById("adminUser").value
let p = document.getElementById("adminPass").value

if(u=="hieu10." && p=="270202"){
document.getElementById("adminPanel").style.display="block"
alert("Admin login thành công")
}else{
alert("Sai tài khoản")
}

}

function addMoney(){

let amount = parseInt(document.getElementById("amount").value)

money += amount

updateUI()
saveMoney()

}

function removeMoney(){

let amount = parseInt(document.getElementById("amount").value)

money -= amount

updateUI()
saveMoney()

}

updateUI()

</script>

</body>
</html>
