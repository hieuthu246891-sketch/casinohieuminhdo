<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Casino Card Slot</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#game{
display:none;
}

.slot{

display:grid;
grid-template-columns:repeat(3,100px);
grid-gap:10px;
justify-content:center;
margin-top:30px;

}

.cell{

width:100px;
height:100px;
background:#222;
border:2px solid gold;
font-size:35px;

display:flex;
align-items:center;
justify-content:center;

}

.spinning{

animation:spin 0.1s linear infinite;

}

@keyframes spin{

0%{transform:translateY(-5px);}
50%{transform:translateY(5px);}
100%{transform:translateY(-5px);}

}

</style>

</head>

<body>

<h1>🎰 CARD SLOT</h1>

<div id="login">

<input id="email" placeholder="email">

<br>

<input id="password" type="password" placeholder="password">

<br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>


<div id="game">

<p>UID: <span id="uid"></span></p>

<div class="slot">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<button onclick="spin()">SPIN</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";



const firebaseConfig = {

apiKey: "AIzaSyA3jfkHd8_FN2M-FBGoIWIz8ZuIYwb-v0c",
authDomain: "casino-slot-ec289.firebaseapp.com",
databaseURL: "https://casino-slot-ec289-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "casino-slot-ec289",
storageBucket: "casino-slot-ec289.firebasestorage.app",
messagingSenderId: "191169506693",
appId: "1:191169506693:web:18eae48ffff0922492e8ec",
measurementId: "G-V7RM6KZXVW"

};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);



const symbols=[

"A♠","K♠","Q♠","J♠",
"A♥","K♥","Q♥","J♥",
"A♦","K♦","Q♦","J♦",
"A♣","K♣","Q♣","J♣"

];


function rand(){

return symbols[Math.floor(Math.random()*symbols.length)];

}


function fill(){

for(let i=0;i<9;i++){

document.getElementById("c"+i).innerText=rand();

}

}



window.register=function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)

.then(()=>{

document.getElementById("msg").innerText="Register success";

})

.catch(e=>{

document.getElementById("msg").innerText=e.message;

})

}



window.login=function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)

.then(()=>{

document.getElementById("msg").innerText="Login success";

})

.catch(()=>{

document.getElementById("msg").innerText="Login fail";

})

}



onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("login").style.display="none";

document.getElementById("game").style.display="block";

document.getElementById("uid").innerText=user.uid;

fill();

}

})



function spinColumn(col){

return new Promise(resolve=>{

let ids=[col,col+3,col+6];

ids.forEach(i=>{

document.getElementById("c"+i).classList.add("spinning");

});


let count=0;

let t=setInterval(()=>{


ids.forEach(i=>{

document.getElementById("c"+i).innerText=rand();

});


count++;

if(count>15){

clearInterval(t);

ids.forEach(i=>{

document.getElementById("c"+i).classList.remove("spinning");

});

resolve();

}

},80);

});

}



window.spin=async function(){

await spinColumn(0);

await spinColumn(1);

await spinColumn(2);

}


</script>

</body>
</html>
